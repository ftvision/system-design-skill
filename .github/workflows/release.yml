name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to release (e.g. 0.3.0). No leading v."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate inputs
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be MAJOR.MINOR.PATCH (got: $VERSION)"
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::tag v$VERSION already exists"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/^version: .*/version: $VERSION/" skill/SKILL.md
          sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"$VERSION\"/" .claude-plugin/marketplace.json
          sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"$VERSION\"/" plugin/.claude-plugin/plugin.json
          ./scripts/sync.sh

      - name: Commit, branch, tag, push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add -A
          git commit -m "Release v$VERSION"
          git branch "release/v$VERSION"
          git tag "v$VERSION"
          git push origin main "refs/heads/release/v$VERSION" "refs/tags/v$VERSION"

      - name: Create GitHub release
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
